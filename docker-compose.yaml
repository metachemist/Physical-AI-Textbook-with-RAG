services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install -e '.[dev]' &&
               alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on: []

  auth:
    image: node:20-slim
    working_dir: /app
    command: bash -c "npm install && npm start"
    volumes:
      - ./auth:/app
      - auth_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env

  frontend:
    image: node:20-slim
    working_dir: /app
    command: bash -c "npm install && npm run start -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - auth
      - backend

volumes:
  frontend_node_modules:
  auth_node_modules:
